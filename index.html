<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* (انسخ نفس الـ CSS من كودك الأصلي وضعه هنا بالكامل) */
        :root { --gold: #D4AF37; --gold-bright: #FFD700; --cyan: #00F2FF; --bg-dark: #02050a; --glass: rgba(15, 20, 35, 0.7); --border: rgba(212, 175, 55, 0.3); }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; background-color: var(--bg-dark); }
        .video-bg video { min-width: 100%; min-height: 100%; width: auto; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.35) contrast(1.2); }
        nav { background: rgba(15, 20, 35, 0.9); padding: 5px 40px; position: fixed; width: 100%; top: 0; z-index: 2000; backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 15px; animation: floatLogo 3s infinite ease-in-out; }
        .nav-logo-text { color: var(--gold); font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin: 0; }
        .nav-logo-img { height: 60px; width: auto; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .nav-links a:hover { color: var(--cyan); }
        .hero { padding: 140px 20px 60px; text-align: center; }
        .hero h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--gold); margin: 10px 0; font-weight: 900; }
        .btn-order { background: linear-gradient(90deg, var(--gold), var(--gold-bright)); color: #000; padding: 18px 40px; border-radius: 100px; text-decoration: none; font-weight: 900; display: inline-block; margin-top: 20px; }
        .scroll-wrapper { position: relative; padding: 20px 0; width: 100%; }
        .scroll-container { display: flex; gap: 20px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 10px 40px; scrollbar-width: none; }
        .hero-img-card { min-width: 100%; flex: 0 0 100%; height: 350px; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; scroll-snap-align: center; }
        .hero-img-card img { width: 100%; height: 100%; object-fit: cover; }
        footer { padding: 40px 20px; text-align: center; border-top: 1px solid var(--border); background: rgba(10, 15, 30, 0.5); }
        .floating-icons { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2500; }
        .whatsapp-float, .facebook-float { border-radius: 50px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        /* استكمل باقي الـ CSS من ملفك الأصلي هنا */

</head>
