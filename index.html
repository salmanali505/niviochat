<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلمان علي | Nevio Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --gold: #d4af37;
            --bg: #02050a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* خلفية ضوئية متحركة خلف البطاقة */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .card {
            width: 350px;
            padding: 40px 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            padding: 5px;
            box-shadow: 0 0 20px var(--primary);
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        .title {
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: block;
        }

        .info-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 0.95rem;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
        }

        .btn-whatsapp {
            border-color: #25d366;
            color: #25d366;
        }
        .btn-whatsapp:hover { background: #25d366; color: #fff; }

        .footer-logo {
            margin-top: 20px;
            opacity: 0.5;
            font-size: 0.8rem;
        }

        .nevio-tag {
            background: linear-gradient(90deg, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <img src="https://ui-avatars.com/api/?name=Salman+Ali&background=00f2ff&color=000&size=128" alt="Salman Ali" class="profile-img">
        
        <h1>سلمان علي الغويبي</h1>
        <span class="title">المدير التنفيذي | <span class="nevio-tag">NEVIO CHAT</span></span>

        <div class="info-grid">
            <a href="tel:+967773354434" class="btn">
                <span>📞</span> إتصال هاتفي
            </a>
            
            <a href="https://wa.me/967773354434" class="btn btn-whatsapp">
                <span>💬</span> واتساب نيفيو شات
            </a>

            <a href="mailto:info@nevio-chat.com" class="btn">
                <span>✉️</span> البريد الإلكتروني
            </a>
        </div>

        <div class="footer-logo">
            NEVIO GROUP - ADEN 2026
        </div>
    </div>

</body>
</html>
